<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kokal — Digital Portfolio & Tools Hub</title>
  <meta name="description" content="Kokal Ltd — a portfolio of digital tools, services, and resources.">
  <meta property="og:title" content="Kokal — Digital Portfolio">
  <meta property="og:description" content="Digital tools, stores & resources — curated by Kokal Ltd.">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'><rect width='40' height='40' rx='3' fill='%230d1117'/><text x='7' y='28' font-family='monospace' font-size='22' fill='%2322d3ee'>K</text></svg>">
  <style>
    :root{--bg:#0d1117;--t:#e6edf3;--t2:#8d96a0;--p:#22d3ee}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--t);line-height:1.6;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
    .container{max-width:500px;text-align:center}
    .logo{font-size:3rem;font-weight:800;color:var(--p);margin-bottom:8px}
    .logo span{color:var(--t2)}
    .tagline{color:var(--t2);font-size:1rem;margin-bottom:4px}
    footer{margin-top:40px;color:var(--t2);font-size:0.8rem}
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Kokal<span>.co</span></div>
    <p class="tagline">Digital tools, stores &amp; resources — curated by Kokal Ltd</p>
    <footer><p>(c) 2026 Kokal Ltd</p></footer>
  </div>
</body>
</html>
